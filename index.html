<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>方方Ray專屬漫畫館</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --primary-color: #ff8800; 
            --primary-hover: #e67a00;
            --bg-color: #f4f6f8; 
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --reader-bg: #1a1a1a; 
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            margin: 0; 
            overflow-x: hidden;
        }

        /* 基礎佈局 */
        header { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 12px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 2px solid var(--primary-color); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { cursor: pointer; color: var(--primary-color); font-weight: 700; font-size: 22px; }
        .social-links { display: flex; gap: 15px; }
        .social-links a { color: var(--text-muted); font-size: 20px; transition: 0.3s; }
        .social-links a:hover { transform: scale(1.2); color: var(--primary-color); }

        /* 頁面切換 */
        .page { display: none; opacity: 0; }
        .page.active { display: block; opacity: 1; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 漫畫主頁 */
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 30px 5%; max-width: 1200px; margin: 0 auto; }
        .manga-card { background: var(--card-bg); border-radius: var(--radius-md); overflow: hidden; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .manga-card:hover { transform: translateY(-5px); }
        .cover-wrapper { padding-top: 140%; position: relative; }
        .cover-wrapper img { position: absolute; top: 0; width: 100%; height: 100%; object-fit: cover; }
        .manga-title { padding: 10px; font-weight: 700; text-align: center; font-size: 14px; }

        /* 詳情頁 */
        .detail-view { max-width: 800px; margin: 20px auto; background: #fff; border-radius: var(--radius-lg); overflow: hidden; }
        .detail-header { display: flex; padding: 30px; background: #2c3e50; color: #fff; gap: 20px; }
        .detail-cover { width: 150px; border-radius: 8px; }
        .chapter-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 20px; }
        .chapter-item { padding: 10px; background: #eee; border-radius: 5px; text-align: center; cursor: pointer; }
        .chapter-item:hover { background: var(--primary-color); color: #fff; }

        /* --- 優化後的閱讀器部分 --- */
        #reader-page { background: var(--reader-bg); min-height: 100vh; position: relative; }
        
        /* 隱形點擊區域：左、中、右 */
        .click-zone-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            z-index: 50;
            pointer-events: none; /* 預設不擋住滾動，但在JS中我們會控制它 */
        }
        .zone { pointer-events: auto; height: 100%; }
        .zone-prev { width: 30%; cursor: w-resize; } /* 左側 30% */
        .zone-menu { width: 40%; cursor: pointer; }   /* 中間 40% 喚起選單 */
        .zone-next { width: 30%; cursor: e-resize; } /* 右側 30% */

        .viewer-content { 
            max-width: 800px; 
            margin: 0 auto; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        .viewer-content img { 
            width: 100%; 
            display: block; 
            transition: opacity 0.3s;
        }

        /* 閱讀器浮動工具欄 */
        .reader-toolbar { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(0, 0, 0, 0.85); 
            color: #fff; 
            padding: 10px 20px; 
            border-radius: 40px; 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s, opacity 0.3s;
        }
        .reader-toolbar.hide { transform: translate(-50%, 100px); opacity: 0; }

        .nav-btn {
            background: none;
            border: none;
            color: #fff;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 14px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .nav-btn:hover { color: var(--primary-color); }
        .nav-btn:disabled { color: #555; cursor: not-allowed; }
        .nav-btn i { font-size: 18px; }

        /* 頁數指示器 */
        .page-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 100;
        }

        @media (max-width: 600px) {
            .reader-toolbar { width: 90%; justify-content: space-around; gap: 5px; padding: 10px 5px; }
            .nav-btn span { display: none; } /* 手機端隱藏文字只留圖標 */
            .detail-header { flex-direction: column; align-items: center; text-align: center; }
        }
    </style>
</head>
<body>

<header id="main-header">
    <div class="header-left">
        <div class="logo" onclick="showPage('home-page')">方方Ray漫畫</div>
        <div class="btn-home" style="cursor:pointer" onclick="showPage('home-page')"><i class="fa-solid fa-house"></i> 首頁</div>
    </div>
    <div class="social-links">
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-discord"></i></a>
    </div>
</header>

<div id="home-page" class="page active">
    <div class="manga-grid" id="home-grid"></div>
</div>

<div id="detail-page" class="page">
    <div class="detail-view">
        <div class="detail-header">
            <img id="detail-img" class="detail-cover" src="" alt="封面">
            <div class="detail-info">
                <h1 id="detail-title">標題</h1>
                <p id="detail-desc">載入中...</p>
            </div>
        </div>
        <div class="chapter-list" id="detail-chapters"></div>
    </div>
</div>

<div id="reader-page" class="page">
    <div class="page-indicator" id="page-num">1 / 1</div>
    
    <div class="click-zone-container">
        <div class="zone zone-prev" onclick="scrollManga('up')"></div>
        <div class="zone zone-menu" onclick="toggleToolbar()"></div>
        <div class="zone zone-next" onclick="scrollManga('down')"></div>
    </div>

    <div class="viewer-content" id="viewer-content"></div>

    <div class="reader-toolbar" id="reader-toolbar">
        <button class="nav-btn" id="prev-ch-btn" onclick="changeChapter(-1)">
            <i class="fa-solid fa-backward-step"></i><span>上章</span>
        </button>
        <button class="nav-btn" onclick="showPage('detail-page')">
            <i class="fa-solid fa-list"></i><span>目錄</span>
        </button>
        <button class="nav-btn" onclick="showPage('home-page')">
            <i class="fa-solid fa-house"></i><span>首頁</span>
        </button>
        <button class="nav-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">
            <i class="fa-solid fa-arrow-up"></i><span>頂部</span>
        </button>
        <button class="nav-btn" id="next-ch-btn" onclick="changeChapter(1)">
            <i class="fa-solid fa-forward-step"></i><span>下章</span>
        </button>
    </div>
</div>

<script>
    let mangaData = [];
    let currentMangaIdx = 0;
    let currentChIdx = 0;

    // 模擬或讀取資料
    async function loadData() {
        // 這裡如果是本機測試，建議直接寫死一份資料在變數中，或者確保 data/data.json 格式正確
        try {
            const response = await fetch('data/data.json');
            mangaData = await response.json();
            renderHome();
        } catch (e) {
            console.error("資料讀取失敗");
        }
    }

    function renderHome() {
        const grid = document.getElementById('home-grid');
        grid.innerHTML = mangaData.map((m, i) => `
            <div class="manga-card" onclick="openManga(${i})">
                <div class="cover-wrapper"><img src="${m.cover}" loading="lazy"></div>
                <div class="manga-title">${m.title}</div>
            </div>
        `).join('');
    }

    function openManga(index) {
        currentMangaIdx = index;
        const m = mangaData[index];
        document.getElementById('detail-title').innerText = m.title;
        document.getElementById('detail-img').src = m.cover;
        document.getElementById('detail-desc').innerText = m.desc || "暫無簡介";
        
        const list = document.getElementById('detail-chapters');
        list.innerHTML = m.chapters.map((ch, ci) => `
            <div class="chapter-item" onclick="startReading(${ci})">${ch.name}</div>
        `).join('');
        showPage('detail-page');
    }

    function startReading(chIndex) {
        currentChIdx = chIndex;
        const manga = mangaData[currentMangaIdx];
        const chapter = manga.chapters[chIndex];
        
        const viewer = document.getElementById('viewer-content');
        viewer.innerHTML = chapter.images.map(img => `<img src="${img}" loading="lazy">`).join('');
        
        // 更新章節按鈕狀態
        document.getElementById('prev-ch-btn').disabled = (chIndex === 0);
        document.getElementById('next-ch-btn').disabled = (chIndex === manga.chapters.length - 1);
        
        showPage('reader-page');
        updatePageIndicator();
    }

    // 左右點擊功能：上下捲動一屏或換章
    function scrollManga(direction) {
        const step = window.innerHeight * 0.8;
        if (direction === 'down') {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 10) {
                // 已到底部，嘗試跳下章
                changeChapter(1);
            } else {
                window.scrollBy({ top: step, behavior: 'smooth' });
            }
        } else {
            if (window.scrollY <= 10) {
                // 已到頂部，嘗試跳上章
                changeChapter(-1);
            } else {
                window.scrollBy({ top: -step, behavior: 'smooth' });
            }
        }
    }

    function changeChapter(offset) {
        const newIdx = currentChIdx + offset;
        const manga = mangaData[currentMangaIdx];
        if (newIdx >= 0 && newIdx < manga.chapters.length) {
            startReading(newIdx);
            window.scrollTo(0, 0);
        }
    }

    function toggleToolbar() {
        document.getElementById('reader-toolbar').classList.toggle('hide');
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('main-header').style.display = (id === 'reader-page') ? 'none' : 'flex';
        window.scrollTo(0, 0);
    }

    // 監聽滾動更新頁數感
    function updatePageIndicator() {
        const images = document.querySelectorAll('.viewer-content img');
        if (images.length === 0) return;
        
        window.onscroll = () => {
            let current = 1;
            images.forEach((img, i) => {
                if (window.scrollY >= img.offsetTop - 200) {
                    current = i + 1;
                }
            });
            document.getElementById('page-num').innerText = `${current} / ${images.length}`;
        };
    }

    loadData();
</script>

</body>
</html>
