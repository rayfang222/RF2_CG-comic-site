<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方方Ray專屬漫畫館</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --primary-color: #ff8800; 
            --primary-hover: #e67a00;
            --bg-color: #f8f9fa; 
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --reader-bg: #0a0a0a; 
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            margin: 0; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .page { display: none; opacity: 0; }
        .page.active { display: block; opacity: 1; animation: fadeIn 0.4s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px);
            padding: 10px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05); 
            position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
        }
        
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { cursor: pointer; color: var(--primary-color); font-weight: 700; font-size: 22px; }
        .btn-home { cursor: pointer; font-size: 15px; color: var(--text-muted); font-weight: 500; }

        .social-links { display: flex; gap: 15px; align-items: center; }
        .social-links a { 
            color: var(--text-muted); 
            font-size: 18px; 
            transition: 0.3s ease; 
            text-decoration: none;
        }
        .social-links a:hover { transform: scale(1.2); color: var(--primary-color); }

        .manga-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
            gap: 25px; 
            padding: 30px 5%; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .manga-card { 
            background: var(--card-bg); 
            border-radius: var(--radius-md); 
            overflow: hidden; 
            cursor: pointer; 
            box-shadow: var(--shadow); 
            transition: 0.3s; 
        }
        .manga-card:hover { transform: translateY(-8px); }
        .cover-wrapper { padding-top: 140%; position: relative; background: #eee; }
        .cover-wrapper img { position: absolute; top: 0; width: 100%; height: 100%; object-fit: cover; }
        .manga-title { padding: 12px; font-weight: 700; text-align: center; }

        /* 詳情頁優化 */
        .detail-view { max-width: 900px; margin: 30px auto; background: var(--card-bg); border-radius: var(--radius-lg); overflow: hidden; width: 92%; box-shadow: var(--shadow); }
        .detail-header { display: flex; padding: 40px; background: #2c3e50; color: #fff; gap: 35px; align-items: flex-start; }
        .detail-cover { width: 200px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); flex-shrink: 0; }
        .detail-info { flex-grow: 1; }
        .detail-info h1 { margin: 0 0 15px 0; font-size: 28px; color: #fff; }
        .manga-meta { margin-bottom: 20px; font-size: 14px; display: flex; flex-wrap: wrap; gap: 15px; opacity: 0.9; }
        .manga-meta span i { margin-right: 5px; color: var(--primary-color); }
        #detail-desc { line-height: 1.6; font-size: 15px; color: #ecf0f1; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }

        .chapter-container { padding: 30px; }
        .chapter-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .chapter-item { padding: 12px; background: #f8f9fa; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #eee; transition: 0.2s; font-weight: 500; }
        .chapter-item:hover { background: var(--primary-color); color: #fff; border-color: var(--primary-color); transform: scale(1.05); }

        #reader-page { background: var(--reader-bg); height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        .reader-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #reader-img { max-width: 100%; max-height: 100%; object-fit: contain; user-select: none; }

        .page-counter { 
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.85); color: #fff; padding: 8px 25px; border-radius: 20px; 
            font-size: 14px; z-index: 20; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .page-counter.show { top: 25px; }

        .reader-toolbar { 
            position: absolute; bottom: -100px; left: 50%; transform: translateX(-50%); 
            background: rgba(25, 25, 25, 0.95); backdrop-filter: blur(15px); 
            color: #fff; padding: 10px; border-radius: 50px; 
            display: flex; 
            justify-content: space-around; 
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1); 
            z-index: 1000; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 500px; 
            max-width: 92vw;
        }
        .reader-toolbar.show { bottom: 30px; }
        
        .reader-toolbar div { 
            cursor: pointer; font-size: 14px; padding: 10px; border-radius: 30px; 
            transition: all 0.2s; flex: 1; 
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .reader-toolbar div i { font-size: 18px; }
        .reader-toolbar div span { font-size: 11px; opacity: 0.8; }
        .reader-toolbar div:hover:not(.disabled) { color: var(--primary-color); }
        .reader-toolbar div.disabled { opacity: 0.2; cursor: not-allowed; }

        .click-area { position: absolute; top: 0; height: 100%; z-index: 10; }
        .zone-prev { left: 0; width: 30%; cursor: w-resize; }
        .zone-menu { left: 30%; width: 40%; cursor: pointer; }
        .zone-next { right: 0; width: 30%; cursor: e-resize; }

        @media (max-width: 768px) {
            .detail-header { flex-direction: column; text-align: center; align-items: center; padding: 30px 20px; }
            .detail-cover { width: 160px; }
            .manga-meta { justify-content: center; }
            .reader-toolbar { width: 95vw; }
            .header-left .btn-home { display: none; }
        }
    </style>
</head>
<body>

<header id="main-header">
    <div class="header-left">
        <div class="logo" onclick="showPage('home-page')">方方Ray漫畫館</div>
        <div class="btn-home" onclick="showPage('home-page')">返回首頁</div>
    </div>
    <div class="social-links">
        <a href="https://www.instagram.com/rf2_cg" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.threads.com/@rf2_cg" target="_blank"><i class="fa-brands fa-threads"></i></a>
        <a href="https://x.com/rf2_cg" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="#" target="_blank"><i class="fa-brands fa-discord"></i></a>
    </div>
</header>

<div id="home-page" class="page active">
    <div class="manga-grid" id="home-grid">
        <div style="grid-column: 1 / -1; text-align: center; padding: 50px;">載入中...</div>
    </div>
</div>

<div id="detail-page" class="page">
    <div class="detail-view">
        <div class="detail-header">
            <img id="detail-img" class="detail-cover" src="" alt="封面">
            <div class="detail-info">
                <h1 id="detail-title">標題</h1>
                <div class="manga-meta">
                    <span id="meta-author"><i class="fa-solid fa-user"></i> 載入中...</span>
                    <span id="meta-type"><i class="fa-solid fa-tag"></i> 載入中...</span>
                    <span id="meta-chapters"><i class="fa-solid fa-book-open"></i> 共 0 話</span>
                    <span id="meta-update"><i class="fa-solid fa-clock"></i> 更新於...</span>
                </div>
                <p id="detail-desc">簡介內容...</p>
            </div>
        </div>
        <div class="chapter-container">
            <h3>選擇章節</h3>
            <div class="chapter-list" id="detail-chapters"></div>
        </div>
    </div>
</div>

<div id="reader-page" class="page">
    <div class="reader-container" id="fullscreen-target">
        <div class="page-counter" id="page-counter">1 / 1</div>
        <div class="click-area zone-prev" onclick="prevPage()"></div>
        <div class="click-area zone-menu" onclick="toggleUI()"></div>
        <div class="click-area zone-next" onclick="nextPage()"></div>
        <img id="reader-img" src="" alt="漫畫內容">
        <div class="reader-toolbar" id="reader-toolbar">
            <div id="btn-prev-ch" onclick="prevChapter()"><i class="fa-solid fa-backward-step"></i><span>上一章</span></div>
            <div onclick="showPage('detail-page')"><i class="fa-solid fa-list-ul"></i><span>目錄</span></div>
            <div id="btn-fullscreen" onclick="toggleFullScreen()"><i class="fa-solid fa-expand"></i><span>全螢幕</span></div>
            <div onclick="showPage('home-page')"><i class="fa-solid fa-house"></i><span>首頁</span></div>
            <div id="btn-next-ch" onclick="nextChapter()"><i class="fa-solid fa-forward-step"></i><span>下一章</span></div>
        </div>
    </div>
</div>

<script>
    let mangaData = [];
    let currentMangaIdx = 0;
    let currentChapterIdx = 0;
    let currentPageIdx = 0;
    let currentImages = [];
    let isUIShown = false;

    async function loadData() {
        try {
            const response = await fetch('data/data.json'); 
            mangaData = await response.json();
            renderHome();
        } catch (error) {
            console.error('Data Load Error:', error);
            document.getElementById('home-grid').innerHTML = '資料讀取失敗，請檢查 data/data.json 路徑';
        }
    }

    function renderHome() {
        const grid = document.getElementById('home-grid');
        grid.innerHTML = mangaData.map((m, i) => `
            <div class="manga-card" onclick="openManga(${i})">
                <div class="cover-wrapper"><img src="${m.cover}" loading="lazy"></div>
                <div class="manga-title">${m.title}</div>
            </div>
        `).join('');
    }

    function openManga(index) {
        currentMangaIdx = index;
        const m = mangaData[index];
        
        // 更新基本文字內容
        document.getElementById('detail-title').innerText = m.title;
        document.getElementById('detail-img').src = m.cover;
        document.getElementById('detail-desc').innerText = m.desc;
        
        // 更新 Meta 資料 (新增部分)
        document.getElementById('meta-author').innerHTML = `<i class="fa-solid fa-user"></i> ${m.author}`;
        document.getElementById('meta-type').innerHTML = `<i class="fa-solid fa-tag"></i> ${m.type || '未分類'}`;
        document.getElementById('meta-chapters').innerHTML = `<i class="fa-solid fa-book-open"></i> 共 ${m.chapters.length} 話`;
        document.getElementById('meta-update').innerHTML = `<i class="fa-solid fa-clock"></i> ${m.updateTime || '未知'}`;

        const list = document.getElementById('detail-chapters');
        list.innerHTML = m.chapters.map((ch, ci) => `<div class="chapter-item" onclick="startReading(${ci})">${ch.name}</div>`).join('');
        showPage('detail-page');
    }

    function startReading(chIndex) {
        currentChapterIdx = chIndex;
        currentImages = mangaData[currentMangaIdx].chapters[chIndex].images;
        currentPageIdx = 0;
        isUIShown = false;
        updateUIState();
        renderPage();
        showPage('reader-page');
    }

    function renderPage() {
        if (!currentImages.length) return;
        document.getElementById('reader-img').src = currentImages[currentPageIdx];
        document.getElementById('page-counter').innerText = `${currentPageIdx + 1} / ${currentImages.length}`;
        document.getElementById('btn-prev-ch').classList.toggle('disabled', currentChapterIdx === 0);
        document.getElementById('btn-next-ch').classList.toggle('disabled', currentChapterIdx === mangaData[currentMangaIdx].chapters.length - 1);
        if (currentPageIdx < currentImages.length - 1) { new Image().src = currentImages[currentPageIdx + 1]; }
    }

    function toggleUI() { isUIShown = !isUIShown; updateUIState(); }
    function updateUIState() {
        const toolbar = document.getElementById('reader-toolbar');
        const counter = document.getElementById('page-counter');
        toolbar.classList.toggle('show', isUIShown);
        counter.classList.toggle('show', isUIShown);
    }

    function toggleFullScreen() {
        const doc = window.document;
        const docEl = document.getElementById('fullscreen-target');
        const requestFS = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
        const exitFS = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
        if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
            requestFS.call(docEl);
            document.getElementById('btn-fullscreen').innerHTML = '<i class="fa-solid fa-compress"></i><span>縮小</span>';
        } else {
            exitFS.call(doc);
            document.getElementById('btn-fullscreen').innerHTML = '<i class="fa-solid fa-expand"></i><span>全螢幕</span>';
        }
    }

    function prevPage() {
        if (currentPageIdx > 0) { currentPageIdx--; renderPage(); } 
        else if (currentChapterIdx > 0) { startReading(currentChapterIdx - 1); currentPageIdx = currentImages.length - 1; renderPage(); }
    }

    function nextPage() {
        if (currentPageIdx < currentImages.length - 1) { currentPageIdx++; renderPage(); } 
        else if (currentChapterIdx < mangaData[currentMangaIdx].chapters.length - 1) { startReading(currentChapterIdx + 1); } 
        else { alert('本漫載入完畢！'); showPage('detail-page'); }
    }

    function prevChapter() { if (currentChapterIdx > 0) startReading(currentChapterIdx - 1); }
    function nextChapter() { if (currentChapterIdx < mangaData[currentMangaIdx].chapters.length - 1) startReading(currentChapterIdx + 1); }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('main-header').style.display = (id === 'reader-page') ? 'none' : 'flex';
        window.scrollTo({top: 0});
    }

    loadData();
</script>

</body>
</html>
