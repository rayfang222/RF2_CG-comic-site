<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方方Ray專屬漫畫館</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --primary-color: #ff8800; 
            --primary-hover: #e67a00;
            --bg-color: #f4f6f8; 
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --reader-bg: #000000; 
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; overflow-x: hidden; }

        /* 頁面切換 */
        .page { display: none; opacity: 0; }
        .page.active { display: block; opacity: 1; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Header */
        header { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            padding: 12px 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary-color); position: sticky; top: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { cursor: pointer; color: var(--primary-color); font-weight: 700; font-size: 22px; }
        .social-links { display: flex; gap: 15px; }
        .social-links a { font-size: 20px; color: var(--text-muted); text-decoration: none; transition: 0.3s; }
        .social-links a:hover { transform: scale(1.2); color: var(--primary-color); }

        /* 列表與詳情 */
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 30px 5%; max-width: 1200px; margin: 0 auto; }
        .manga-card { background: var(--card-bg); border-radius: var(--radius-md); overflow: hidden; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .manga-card:hover { transform: translateY(-8px); }
        .cover-wrapper { padding-top: 140%; position: relative; background: #eee; }
        .cover-wrapper img { position: absolute; top: 0; width: 100%; height: 100%; object-fit: cover; }
        .manga-title { padding: 12px; font-weight: 700; text-align: center; }

        .detail-view { max-width: 900px; margin: 30px auto; background: var(--card-bg); border-radius: var(--radius-lg); overflow: hidden; width: 90%; }
        .detail-header { display: flex; padding: 30px; background: #2c3e50; color: #fff; gap: 30px; }
        .detail-cover { width: 180px; border-radius: 8px; flex-shrink: 0; }
        .chapter-container { padding: 30px; }
        .chapter-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
        .chapter-item { padding: 10px; background: #f8f9fa; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #ddd; }
        .chapter-item:hover { background: var(--primary-color); color: #fff; }

        /* --- 閱讀器優化核心樣式 --- */
        #reader-page { background: var(--reader-bg); height: 100vh; width: 100vw; overflow: hidden; position: fixed; top: 0; left: 0; }
        
        .reader-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #reader-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* 點擊區域分配 */
        .click-area { position: absolute; top: 0; height: 100%; z-index: 10; }
        .zone-left { left: 0; width: 30%; cursor: w-resize; }
        .zone-right { right: 0; width: 30%; cursor: e-resize; }
        .zone-center { left: 30%; width: 40%; cursor: pointer; }

        /* 控制 UI */
        .reader-ui { 
            opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 100;
        }
        .reader-ui.show { opacity: 1; visibility: visible; }

        .page-counter { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.7); color: #fff; padding: 6px 16px; border-radius: 20px; font-size: 14px; 
        }

        .reader-toolbar { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: rgba(25, 25, 25, 0.9); backdrop-filter: blur(15px); 
            color: #fff; padding: 12px 20px; border-radius: 40px; 
            display: flex; gap: 15px; align-items: center; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .reader-toolbar div { cursor: pointer; padding: 8px 15px; border-radius: 20px; font-size: 14px; transition: 0.2s; white-space: nowrap; }
        .reader-toolbar div:hover:not(.disabled) { background: var(--primary-color); }
        .reader-toolbar .disabled { color: #555; cursor: default; }

        @media (max-width: 600px) {
            .reader-toolbar { width: 90%; justify-content: space-around; gap: 5px; padding: 10px; }
            .reader-toolbar div { padding: 8px 10px; font-size: 13px; }
            .detail-header { flex-direction: column; align-items: center; text-align: center; }
            .detail-cover { width: 140px; }
        }
    </style>
</head>
<body>

<header id="main-header">
    <div class="header-left">
        <div class="logo" onclick="showPage('home-page')">方方Ray專屬漫畫館</div>
        <div class="btn-home" onclick="showPage('home-page')">返回首頁</div>
    </div>
    <div class="social-links">
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-discord"></i></a>
    </div>
</header>

<div id="home-page" class="page active">
    <div class="manga-grid" id="home-grid"></div>
</div>

<div id="detail-page" class="page">
    <div class="detail-view">
        <div class="detail-header">
            <img id="detail-img" class="detail-cover" src="">
            <div class="detail-info">
                <h1 id="detail-title"></h1>
                <p id="detail-desc"></p>
            </div>
        </div>
        <div class="chapter-container">
            <h3>選擇章節</h3>
            <div class="chapter-list" id="detail-chapters"></div>
        </div>
    </div>
</div>

<div id="reader-page" class="page">
    <div class="reader-container">
        <div class="click-area zone-left" onclick="prevPage()"></div>
        <div class="click-area zone-center" onclick="toggleUI()"></div>
        <div class="click-area zone-right" onclick="nextPage()"></div>

        <img id="reader-img" src="">
        
        <div id="reader-ui-layer" class="reader-ui">
            <div class="page-counter" id="page-counter">0 / 0</div>
            <div class="reader-toolbar">
                <div id="btn-prev-ch" onclick="prevChapter()">上一章</div>
                <div onclick="showPage('detail-page')"><i class="fa-solid fa-list"></i> 目錄</div>
                <div onclick="showPage('home-page')"><i class="fa-solid fa-house"></i> 首頁</div>
                <div id="btn-next-ch" onclick="nextChapter()">下一章</div>
            </div>
        </div>
    </div>
</div>

<script>
    let mangaData = [];
    let currentMangaIdx = 0;
    let currentChapterIdx = 0;
    let currentPageIdx = 0;
    let isUIShowing = false;

    async function loadData() {
        try {
            const response = await fetch('data/data.json');
            mangaData = await response.json();
            renderHome();
        } catch (e) {
            console.error("Data Load Error");
        }
    }

    function renderHome() {
        const grid = document.getElementById('home-grid');
        grid.innerHTML = mangaData.map((m, i) => `
            <div class="manga-card" onclick="openManga(${i})">
                <div class="cover-wrapper"><img src="${m.cover}"></div>
                <div class="manga-title">${m.title}</div>
            </div>
        `).join('');
    }

    function openManga(idx) {
        currentMangaIdx = idx;
        const m = mangaData[idx];
        document.getElementById('detail-title').innerText = m.title;
        document.getElementById('detail-img').src = m.cover;
        document.getElementById('detail-desc').innerText = m.desc;
        document.getElementById('detail-chapters').innerHTML = m.chapters.map((ch, ci) => 
            `<div class="chapter-item" onclick="startReading(${ci})">${ch.name}</div>`
        ).join('');
        showPage('detail-page');
    }

    function startReading(chIdx) {
        currentChapterIdx = chIdx;
        currentPageIdx = 0;
        hideUI(); // 進入時隱藏工具列
        renderPage();
        showPage('reader-page');
    }

    function renderPage() {
        const m = mangaData[currentMangaIdx];
        const ch = m.chapters[currentChapterIdx];
        const imgEl = document.getElementById('reader-img');
        
        imgEl.src = ch.images[currentPageIdx];
        document.getElementById('page-counter').innerText = `${currentPageIdx + 1} / ${ch.images.length}`;
        
        // 更新按鈕狀態
        document.getElementById('btn-prev-ch').className = currentChapterIdx === 0 ? 'disabled' : '';
        document.getElementById('btn-next-ch').className = currentChapterIdx === m.chapters.length - 1 ? 'disabled' : '';

        // 預載下一張
        if (currentPageIdx < ch.images.length - 1) {
            new Image().src = ch.images[currentPageIdx + 1];
        }
    }

    // --- 工具列控制 ---
    function toggleUI() {
        isUIShowing = !isUIShowing;
        const ui = document.getElementById('reader-ui-layer');
        if (isUIShowing) ui.classList.add('show');
        else ui.classList.remove('show');
    }

    function hideUI() {
        isUIShowing = false;
        document.getElementById('reader-ui-layer').classList.remove('show');
    }

    function prevPage() {
        hideUI();
        if (currentPageIdx > 0) {
            currentPageIdx--;
            renderPage();
        } else if (currentChapterIdx > 0) {
            currentChapterIdx--;
            currentPageIdx = mangaData[currentMangaIdx].chapters[currentChapterIdx].images.length - 1;
            renderPage();
        }
    }

    function nextPage() {
        hideUI();
        const ch = mangaData[currentMangaIdx].chapters[currentChapterIdx];
        if (currentPageIdx < ch.images.length - 1) {
            currentPageIdx++;
            renderPage();
        } else if (currentChapterIdx < mangaData[currentMangaIdx].chapters.length - 1) {
            currentChapterIdx++;
            currentPageIdx = 0;
            renderPage();
        } else {
            alert("已是最後一頁");
            showPage('detail-page');
        }
    }

    function prevChapter() {
        if (currentChapterIdx > 0) startReading(currentChapterIdx - 1);
    }

    function nextChapter() {
        if (currentChapterIdx < mangaData[currentMangaIdx].chapters.length - 1) startReading(currentChapterIdx + 1);
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('main-header').style.display = (id === 'reader-page') ? 'none' : 'flex';
        window.scrollTo(0, 0);
    }

    loadData();
</script>

</body>
</html>
