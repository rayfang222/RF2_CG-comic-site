<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>方方Ray專屬漫畫館</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --primary-color: #ff8800; 
            --primary-hover: #e67a00;
            --bg-color: #f4f6f8; 
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --reader-bg: #1a1a1a; 
            --radius-md: 12px;
            --radius-lg: 20px;
        }

        body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; overflow-x: hidden; }

        /* 頁面切換 */
        .page { display: none; opacity: 0; }
        .page.active { display: block; opacity: 1; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Header */
        header { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(10px);
            padding: 12px 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--primary-color); position: sticky; top: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { cursor: pointer; color: var(--primary-color); font-weight: 700; font-size: 22px; }
        .btn-home { cursor: pointer; color: var(--text-muted); font-size: 14px; }

        /* 漫畫列表 */
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 30px 5%; max-width: 1200px; margin: 0 auto; }
        .manga-card { background: var(--card-bg); border-radius: var(--radius-md); overflow: hidden; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .manga-card:hover { transform: translateY(-5px); }
        .cover-wrapper { padding-top: 140%; position: relative; background: #ddd; }
        .cover-wrapper img { position: absolute; top: 0; width: 100%; height: 100%; object-fit: cover; }
        .manga-title { padding: 10px; font-weight: 700; text-align: center; }

        /* 詳情頁 */
        .detail-view { max-width: 800px; margin: 20px auto; background: #fff; border-radius: var(--radius-lg); overflow: hidden; }
        .detail-header { display: flex; padding: 20px; background: #2c3e50; color: #fff; gap: 20px; }
        .detail-cover { width: 120px; border-radius: 8px; }
        .chapter-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 20px; }
        .chapter-item { padding: 10px; background: #eee; border-radius: 5px; text-align: center; cursor: pointer; }
        .chapter-item:hover { background: var(--primary-color); color: #fff; }

        /* --- 閱讀器優化區 --- */
        #reader-page { background: var(--reader-bg); min-height: 100vh; position: relative; }
        
        /* 點擊區域控制 */
        .click-zone { position: fixed; top: 0; height: 100vh; z-index: 50; }
        .zone-prev { left: 0; width: 30%; } /* 左 30% 上一頁 */
        .zone-next { right: 0; width: 30%; } /* 右 30% 下一頁 */
        .zone-menu { left: 30%; width: 40%; } /* 中間 40% 喚起選單 */

        .viewer-content { max-width: 800px; margin: 0 auto; }
        .viewer-content img { width: 100%; display: block; }

        /* 底部工具欄 */
        .reader-toolbar { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(0, 0, 0, 0.85); color: #fff; padding: 15px 25px; 
            border-radius: 40px; display: flex; gap: 20px; align-items: center;
            z-index: 1000; transition: 0.3s; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .reader-toolbar.hide { opacity: 0; transform: translate(-50%, 100px); pointer-events: none; }
        .tool-btn { cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 12px; min-width: 50px; }
        .tool-btn i { font-size: 18px; margin-bottom: 4px; }
        .tool-btn:hover { color: var(--primary-color); }
        .tool-btn.disabled { color: #555; cursor: not-allowed; }

        .page-info { font-size: 13px; color: var(--primary-color); background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 10px; }
    </style>
</head>
<body>

<header id="main-header">
    <div class="header-left">
        <div class="logo" onclick="showPage('home-page')">方方Ray專屬漫畫館</div>
        <div class="btn-home" onclick="showPage('home-page')">返回首頁</div>
    </div>
</header>

<div id="home-page" class="page active">
    <div class="manga-grid" id="home-grid"></div>
</div>

<div id="detail-page" class="page">
    <div class="detail-view">
        <div class="detail-header">
            <img id="detail-img" class="detail-cover" src="">
            <div class="detail-info">
                <h1 id="detail-title"></h1>
                <p id="detail-desc"></p>
            </div>
        </div>
        <div class="chapter-list" id="detail-chapters"></div>
    </div>
</div>

<div id="reader-page" class="page">
    <div class="click-zone zone-prev" onclick="scrollStep(-0.8)"></div>
    <div class="click-zone zone-menu" onclick="toggleToolbar()"></div>
    <div class="click-zone zone-next" onclick="scrollStep(0.8)"></div>

    <div class="viewer-content" id="viewer-content"></div>

    <div class="reader-toolbar" id="reader-toolbar">
        <div class="tool-btn" id="btn-prev-ch" onclick="changeChapter(-1)">
            <i class="fa-solid fa-backward-step"></i>上一章
        </div>
        <div class="tool-btn" onclick="showPage('detail-page')">
            <i class="fa-solid fa-list"></i>目錄
        </div>
        <div class="page-info" id="reader-stats">第 1 頁</div>
        <div class="tool-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">
            <i class="fa-solid fa-arrow-up"></i>頂部
        </div>
        <div class="tool-btn" id="btn-next-ch" onclick="changeChapter(1)">
            <i class="fa-solid fa-forward-step"></i>下一章
        </div>
    </div>
</div>

<script>
    let mangaData = [];
    let currentMangaIdx = 0;
    let currentChIdx = 0;

    async function loadData() {
        try {
            const response = await fetch('data/data.json'); 
            mangaData = await response.json();
            renderHome();
        } catch (e) {
            document.getElementById('home-grid').innerHTML = "資料載入失敗";
        }
    }

    function renderHome() {
        const grid = document.getElementById('home-grid');
        grid.innerHTML = mangaData.map((m, i) => `
            <div class="manga-card" onclick="openManga(${i})">
                <div class="cover-wrapper"><img src="${m.cover}"></div>
                <div class="manga-title">${m.title}</div>
            </div>
        `).join('');
    }

    function openManga(index) {
        currentMangaIdx = index;
        const m = mangaData[index];
        document.getElementById('detail-title').innerText = m.title;
        document.getElementById('detail-img').src = m.cover;
        document.getElementById('detail-desc').innerText = m.desc;
        const list = document.getElementById('detail-chapters');
        list.innerHTML = m.chapters.map((ch, ci) => `
            <div class="chapter-item" onclick="startReading(${ci})">${ch.name}</div>
        `).join('');
        showPage('detail-page');
    }

    function startReading(chIndex) {
        currentChIdx = chIndex;
        const manga = mangaData[currentMangaIdx];
        const chapter = manga.chapters[chIndex];
        const viewer = document.getElementById('viewer-content');
        
        viewer.innerHTML = chapter.images.map(img => `<img src="${img}" loading="lazy" class="manga-img">`).join('');
        
        // 更新按鈕狀態
        document.getElementById('btn-prev-ch').classList.toggle('disabled', chIndex === 0);
        document.getElementById('btn-next-ch').classList.toggle('disabled', chIndex === manga.chapters.length - 1);
        
        showPage('reader-page');
        updateProgress();
    }

    // 章節切換
    function changeChapter(step) {
        const newIdx = currentChIdx + step;
        if (newIdx >= 0 && newIdx < mangaData[currentMangaIdx].chapters.length) {
            startReading(newIdx);
            window.scrollTo(0, 0);
        }
    }

    // 點擊區域滾動 (模擬翻頁)
    function scrollStep(multiplier) {
        const vh = window.innerHeight;
        window.scrollBy({ top: vh * multiplier, behavior: 'smooth' });
    }

    // 切換工具欄顯示
    function toggleToolbar() {
        document.getElementById('reader-toolbar').classList.toggle('hide');
    }

    // 更新閱讀進度
    function updateProgress() {
        const imgs = document.querySelectorAll('.manga-img');
        const stats = document.getElementById('reader-stats');
        
        window.onscroll = () => {
            let current = 1;
            imgs.forEach((img, i) => {
                if (window.scrollY >= img.offsetTop - 200) current = i + 1;
            });
            stats.innerText = `第 ${current} / ${imgs.length} 頁`;
        };
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('main-header').style.display = (id === 'reader-page') ? 'none' : 'flex';
        
        // 進入閱讀模式預設顯示工具欄
        if(id === 'reader-page') {
            document.getElementById('reader-toolbar').classList.remove('hide');
        }
    }

    loadData();
</script>

</body>
</html>
