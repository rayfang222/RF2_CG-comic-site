<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>漫畫頁面</title>
<style>
  body {
    margin: 0;
    background-color: #000; /* 黑底 */
    font-family: Arial, sans-serif;
    color: #fff;
  }

  .header {
    display: flex;
    align-items: center;
    padding: 20px;
  }

  .avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background-color: red; /* 你的頭像位置 */
    margin-right: 15px;
  }

  .username {
    font-size: 24px;
    color: pink; /* 名字顏色 */
  }

  .icons {
    display: flex;
    gap: 15px;
    margin: 10px 0 20px 75px; /* 和頭像對齊 */
  }

  .icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background-color: white; /* 圓形白色圖示 */
    display: flex;
    justify-content: center;
    align-items: center;
    color: black;
    text-decoration: none;
    font-weight: bold;
    cursor: pointer;
  }

  .comic {
    width: 200px;
    height: 300px;
    margin: 0 auto 20px auto;
    background-color: blue; /* 漫畫封面位置 */
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">
  <div class="avatar"></div>
  <div class="username">你的名字</div>
</div>

<div class="icons">
  <a href="#" class="icon">哀</a>
  <a href="#" class="icon">脆</a>
  <a href="#" class="icon">X</a>
  <a href="#" class="icon">DC</a>
</div>

<div class="comic"></div>

</body>
</html>
