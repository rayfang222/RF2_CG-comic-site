<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方方Ray專屬漫畫館</title>
    <style>
        /* 樣式部分保持不變，為節省空間簡寫，可套用先前給你的美化 CSS */
        :root { --primary-color: #f80; --bg-color: #f4f4f4; --reader-bg: #121212; }
        body { font-family: sans-serif; background: var(--bg-color); margin: 0; }
        .page { display: none; }
        .page.active { display: block; }
        header { background: #fff; padding: 10px 20px; display: flex; justify-content: space-between; border-bottom: 2px solid var(--primary-color); position: sticky; top:0; z-index:100; }
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .manga-card { background: #fff; border-radius: 8px; overflow: hidden; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .cover-wrapper { padding-top: 133%; position: relative; background: #eee; }
        .cover-wrapper img { position: absolute; top:0; width: 100%; height: 100%; object-fit: cover; }
        .detail-view { max-width: 800px; margin: 20px auto; background: #fff; border-radius: 8px; overflow: hidden; }
        .detail-header { display: flex; padding: 20px; background: #333; color: #fff; gap: 20px; }
        .detail-cover { width: 150px; border: 2px solid #fff; }
        .chapter-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 20px; }
        .chapter-item { padding: 8px; border: 1px solid #ddd; text-align: center; text-decoration: none; color: #333; font-size: 14px; cursor: pointer; }
        .viewer-content img { width: 100%; display: block; }
        .reader-toolbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; display: flex; gap: 15px; }
    </style>
</head>
<body>

<header id="main-header">
    <div onclick="showPage('home-page')" style="cursor:pointer; color:var(--primary-color); font-weight:bold; font-size:20px;">方方Ray專屬漫畫館</div>
    <div onclick="showPage('home-page')" style="cursor:pointer; font-size:14px;">返回首頁</div>
</header>

<div id="home-page" class="page active">
    <div class="manga-grid" id="home-grid">Loading...</div>
</div>

<div id="detail-page" class="page">
    <div class="detail-view">
        <div class="detail-header">
            <img id="detail-img" class="detail-cover" src="">
            <div>
                <h1 id="detail-title">標題</h1>
                <p id="detail-desc">簡介內容...</p>
            </div>
        </div>
        <div class="chapter-list" id="detail-chapters"></div>
    </div>
</div>

<div id="reader-page" class="page" style="background: #121212; min-height: 100vh;">
    <div class="viewer-content" id="viewer-content"></div>
    <div class="reader-toolbar">
        <div onclick="showPage('detail-page')" style="cursor:pointer;">目錄</div>
        <div onclick="showPage('home-page')" style="cursor:pointer;">首頁</div>
    </div>
</div>

<script>
    let mangaData = [];
    let currentMangaIdx = 0;

    // 非同步讀取 JSON 檔案
    async function loadData() {
        try {
            const response = await fetch('data/data.json'); // 讀取同目錄下的 data.json
            mangaData = await response.json();
            renderHome();
        } catch (error) {
            console.error('無法讀取 JSON:', error);
            document.getElementById('home-grid').innerText = '讀取失敗，請確認是否使用 Server 開啟網頁。';
        }
    }

    function renderHome() {
        const grid = document.getElementById('home-grid');
        grid.innerHTML = mangaData.map((m, i) => `
            <div class="manga-card" onclick="openManga(${i})">
                <div class="cover-wrapper"><img src="${m.cover}"></div>
                <div style="padding:10px; font-weight:bold;">${m.title}</div>
            </div>
        `).join('');
    }

    function openManga(index) {
        currentMangaIdx = index;
        const m = mangaData[index];
        document.getElementById('detail-title').innerText = m.title;
        document.getElementById('detail-img').src = m.cover;
        document.getElementById('detail-desc').innerText = m.desc;
        
        const list = document.getElementById('detail-chapters');
        list.innerHTML = m.chapters.map((ch, ci) => `
            <div class="chapter-item" onclick="startReading(${ci})">${ch.name}</div>
        `).join('');
        showPage('detail-page');
    }

    function startReading(chIndex) {
        const images = mangaData[currentMangaIdx].chapters[chIndex].images;
        const viewer = document.getElementById('viewer-content');
        viewer.innerHTML = images.map(img => `<img src="${img}" loading="lazy">`).join('');
        showPage('reader-page');
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('main-header').style.display = (id === 'reader-page') ? 'none' : 'flex';
        window.scrollTo(0,0);
    }

    // 初始化讀取
    loadData();
</script>

</body>
</html>
