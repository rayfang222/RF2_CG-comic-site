<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方方Ray專屬漫畫館</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --primary-color: #ff8800; 
            --primary-hover: #e67a00;
            --bg-color: #f8f9fa; 
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --reader-bg: #0a0a0a; 
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            margin: 0; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* 頁面切換動畫 */
        .page { display: none; opacity: 0; }
        .page.active { display: block; opacity: 1; animation: fadeIn 0.4s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 導覽列優化 */
        header { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px);
            padding: 10px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05); 
            position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
        }
        
        .header-left { display: flex; align-items: center; gap: 25px; }
        .logo { cursor: pointer; color: var(--primary-color); font-weight: 700; font-size: 24px; letter-spacing: -0.5px; }
        .btn-home { cursor: pointer; font-size: 15px; color: var(--text-muted); transition: 0.2s; font-weight: 500; }
        .btn-home:hover { color: var(--primary-color); }

        /* 社群連結樣式 */
        .social-links { display: flex; gap: 18px; align-items: center; }
        .social-links a { 
            color: var(--text-muted); 
            font-size: 20px; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            text-decoration: none;
        }
        .social-links a:hover { transform: scale(1.2); color: var(--primary-color); }

        /* 漫畫網格 RWD */
        .manga-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; 
            padding: 30px 5%; 
            max-width: 1300px; 
            margin: 0 auto; 
        }
        .manga-card { 
            background: var(--card-bg); 
            border-radius: var(--radius-md); 
            overflow: hidden; 
            cursor: pointer; 
            box-shadow: var(--shadow); 
            transition: 0.3s; 
            border: 1px solid rgba(0,0,0,0.03);
        }
        .manga-card:hover { transform: translateY(-10px); box-shadow: 0 12px 30px rgba(0,0,0,0.12); }
        .cover-wrapper { padding-top: 140%; position: relative; background: #eee; overflow: hidden; }
        .cover-wrapper img { position: absolute; top: 0; width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .manga-card:hover .cover-wrapper img { scale: 1.05; }
        .manga-title { padding: 15px; font-weight: 700; text-align: center; font-size: 16px; }

        /* 詳情頁優化 */
        .detail-view { max-width: 1000px; margin: 40px auto; background: var(--card-bg); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); width: 92%; }
        .detail-header { display: flex; padding: 40px; background: linear-gradient(135deg, #2c3e50 0%, #000000 100%); color: #fff; gap: 40px; align-items: center; }
        .detail-cover { width: 220px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .detail-info h1 { margin: 0 0 15px 0; font-size: 32px; }
        .detail-info p { opacity: 0.8; line-height: 1.6; font-size: 15px; }
        .chapter-container { padding: 40px; }
        .chapter-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .chapter-item { padding: 12px; background: #f8f9fa; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid #eee; transition: 0.2s; font-weight: 500; }
        .chapter-item:hover { background: var(--primary-color); color: #fff; border-color: var(--primary-color); transform: translateY(-2px); }

        /* 閱讀器樣式 */
        #reader-page { background: var(--reader-bg); height: 100vh; width: 100vw; overflow: hidden; position: relative; }
        .reader-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #reader-img { max-width: 100%; max-height: 100%; object-fit: contain; user-select: none; }

        /* 閱讀器 UI */
        .page-counter { 
            position: absolute; top: -60px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); color: #fff; 
            padding: 8px 24px; border-radius: 30px; font-size: 14px; z-index: 20; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .page-counter.show { top: 25px; }

        .reader-toolbar { 
            position: absolute; bottom: -100px; left: 50%; transform: translateX(-50%); 
            background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); 
            color: #fff; padding: 12px 30px; border-radius: 50px; 
            display: flex; gap: 15px; align-items: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); 
            z-index: 1000; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .reader-toolbar.show { bottom: 30px; }
        .reader-toolbar div { cursor: pointer; font-size: 14px; padding: 10px 18px; border-radius: 30px; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .reader-toolbar div:hover:not(.disabled) { background: var(--primary-color); color: white; }
        .reader-toolbar div.disabled { opacity: 0.2; cursor: not-allowed; }

        /* 手機 RWD 優化 */
        @media (max-width: 768px) {
            .header-left .btn-home { display: none; }
            .detail-header { flex-direction: column; text-align: center; padding: 30px; }
            .detail-cover { width: 160px; }
            .manga-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
            .social-links { gap: 12px; }
            .social-links a { font-size: 18px; }
        }

        @media (max-width: 480px) {
            .reader-toolbar { width: 90%; padding: 8px; gap: 5px; }
            .reader-toolbar div span { display: none; }
            .reader-toolbar div { padding: 12px; }
            .reader-toolbar div i { font-size: 18px; }
        }

        /* 點擊區域 */
        .click-area { position: absolute; top: 0; height: 100%; z-index: 10; }
        .zone-prev { left: 0; width: 30%; cursor: w-resize; }
        .zone-menu { left: 30%; width: 40%; cursor: pointer; }
        .zone-next { right: 0; width: 30%; cursor: e-resize; }

        footer { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>

<header id="main-header">
    <div class="header-left">
        <div class="logo" onclick="showPage('home-page')">方方Ray<span style="font-weight: 400; font-size: 0.8em;">漫畫館</span></div>
        <div class="btn-home" onclick="showPage('home-page')">回首頁</div>
    </div>
    <div class="social-links">
        <a href="https://www.instagram.com/rf2_cg?igsh=YjJ4NndzbHY3aXcz&utm_source=qr" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.threads.com/@rf2_cg?igshid=NTc4MTIwNjQ2YQ==" target="_blank" title="Threads"><i class="fa-brands fa-threads"></i></a>
        <a href="https://x.com/rf2_cg?s=21" target="_blank" title="X"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="https://discord.gg/你的邀請碼" target="_blank" title="Discord"><i class="fa-brands fa-discord"></i></a>
    </div>
</header>

<div id="home-page" class="page active">
    <div class="manga-grid" id="home-grid">
        <div style="grid-column: 1 / -1; text-align: center; padding: 100px; color: var(--text-muted);">
            <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i><br><br>載入漫畫中...
        </div>
    </div>
    <footer>
        <p>© 2024 方方Ray專屬漫畫館</p>
    </footer>
</div>

<div id="detail-page" class="page">
    <div class="detail-view">
        <div class="detail-header">
            <img id="detail-img" class="detail-cover" src="" alt="封面">
            <div class="detail-info">
                <h1 id="detail-title">標題</h1>
                <p id="detail-desc">簡介內容...</p>
            </div>
        </div>
        <div class="chapter-container">
            <h3 style="margin-bottom: 25px;"><i class="fa-solid fa-layer-group" style="margin-right: 10px; color: var(--primary-color);"></i>章節列表</h3>
            <div class="chapter-list" id="detail-chapters"></div>
        </div>
    </div>
</div>

<div id="reader-page" class="page">
    <div class="reader-container" id="fullscreen-target">
        <div class="page-counter" id="page-counter">1 / 1</div>
        
        <div class="click-area zone-prev" onclick="prevPage()"></div>
        <div class="click-area zone-menu" onclick="toggleUI()"></div>
        <div class="click-area zone-next" onclick="nextPage()"></div>
        
        <img id="reader-img" src="" alt="漫畫內容">
        
        <div class="reader-toolbar" id="reader-toolbar">
            <div id="btn-prev-ch" onclick="prevChapter()"><i class="fa-solid fa-backward-step"></i><span>上一章</span></div>
            <div onclick="showPage('detail-page')"><i class="fa-solid fa-list-ul"></i><span>目錄</span></div>
            <div id="btn-fullscreen" onclick="toggleFullScreen()"><i class="fa-solid fa-expand"></i><span>全螢幕</span></div>
            <div onclick="showPage('home-page')"><i class="fa-solid fa-house"></i><span>首頁</span></div>
            <div id="btn-next-ch" onclick="nextChapter()"><span>下一章</span><i class="fa-solid fa-forward-step"></i></div>
        </div>
    </div>
</div>

<script>
    let mangaData = [];
    let currentMangaIdx = 0;
    let currentChapterIdx = 0;
    let currentPageIdx = 0;
    let currentImages = [];
    let isUIShown = false;

    // 模擬或讀取資料
    async function loadData() {
        try {
            const response = await fetch('data/data.json'); 
            mangaData = await response.json();
            renderHome();
        } catch (error) {
            console.error('Data Load Error:', error);
            // 這裡可以放一段備用資料防止讀取失敗
        }
    }

    function renderHome() {
        const grid = document.getElementById('home-grid');
        grid.innerHTML = mangaData.map((m, i) => `
            <div class="manga-card" onclick="openManga(${i})">
                <div class="cover-wrapper"><img src="${m.cover}" loading="lazy"></div>
                <div class="manga-title">${m.title}</div>
            </div>
        `).join('');
    }

    function openManga(index) {
        currentMangaIdx = index;
        const m = mangaData[index];
        document.getElementById('detail-title').innerText = m.title;
        document.getElementById('detail-img').src = m.cover;
        document.getElementById('detail-desc').innerText = m.desc;
        const list = document.getElementById('detail-chapters');
        list.innerHTML = m.chapters.map((ch, ci) => `<div class="chapter-item" onclick="startReading(${ci})">${ch.name}</div>`).join('');
        showPage('detail-page');
    }

    function startReading(chIndex) {
        currentChapterIdx = chIndex;
        currentImages = mangaData[currentMangaIdx].chapters[chIndex].images;
        currentPageIdx = 0;
        isUIShown = false;
        updateUIState();
        renderPage();
        showPage('reader-page');
    }

    function renderPage() {
        if (!currentImages.length) return;
        const img = document.getElementById('reader-img');
        img.src = currentImages[currentPageIdx];
        document.getElementById('page-counter').innerText = `${currentPageIdx + 1} / ${currentImages.length}`;
        
        document.getElementById('btn-prev-ch').classList.toggle('disabled', currentChapterIdx === 0);
        document.getElementById('btn-next-ch').classList.toggle('disabled', currentChapterIdx === mangaData[currentMangaIdx].chapters.length - 1);
        
        // 預載下一張
        if (currentPageIdx < currentImages.length - 1) {
            const nextImg = new Image();
            nextImg.src = currentImages[currentPageIdx + 1];
        }
    }

    function toggleUI() {
        isUIShown = !isUIShown;
        updateUIState();
    }

    function updateUIState() {
        const toolbar = document.getElementById('reader-toolbar');
        const counter = document.getElementById('page-counter');
        if (isUIShown) {
            toolbar.classList.add('show');
            counter.classList.add('show');
        } else {
            toolbar.classList.remove('show');
            counter.classList.remove('show');
        }
    }

    function toggleFullScreen() {
        const doc = window.document;
        const docEl = document.getElementById('fullscreen-target');
        const requestFS = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
        const exitFS = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

        if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
            requestFS.call(docEl);
        } else {
            exitFS.call(doc);
        }
    }

    function prevPage() {
        if (currentPageIdx > 0) {
            currentPageIdx--;
            renderPage();
        } else if (currentChapterIdx > 0) {
            startReading(currentChapterIdx - 1);
        }
    }

    function nextPage() {
        if (currentPageIdx < currentImages.length - 1) {
            currentPageIdx++;
            renderPage();
        } else if (currentChapterIdx < mangaData[currentMangaIdx].chapters.length - 1) {
            startReading(currentChapterIdx + 1);
        } else {
            alert('本漫載入完畢！');
            showPage('detail-page');
        }
    }

    function prevChapter() { if (currentChapterIdx > 0) startReading(currentChapterIdx - 1); }
    function nextChapter() { if (currentChapterIdx < mangaData[currentMangaIdx].chapters.length - 1) startReading(currentChapterIdx + 1); }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('main-header').style.display = (id === 'reader-page') ? 'none' : 'flex';
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    loadData();
</script>

</body>
</html>
