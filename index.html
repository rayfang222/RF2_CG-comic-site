<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>方方Ray專屬漫畫館</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --primary-color: #ff8800; 
            --primary-hover: #e67a00;
            --bg-color: #f8f9fa; 
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --reader-bg: #0a0a0a; 
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            margin: 0; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .page { display: none; opacity: 0; }
        .page.active { display: block; opacity: 1; animation: fadeIn 0.4s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px);
            padding: 10px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05); 
            position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.03);
        }
        
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { cursor: pointer; color: var(--primary-color); font-weight: 700; font-size: 22px; }
        .btn-home { cursor: pointer; font-size: 15px; color: var(--text-muted); font-weight: 500; }

        .social-links { display: flex; gap: 15px; align-items: center; }
        .social-links a { 
            color: var(--text-muted); 
            font-size: 18px; 
            transition: 0.3s ease; 
            text-decoration: none;
        }
        .social-links a:hover { transform: scale(1.2); color: var(--primary-color); }

        .manga-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
            gap: 25px; 
            padding: 30px 5%; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .manga-card { 
            background: var(--card-bg); 
            border-radius: var(--radius-md); 
            overflow: hidden; 
            cursor: pointer; 
            box-shadow: var(--shadow); 
            transition: 0.3s; 
        }
        .manga-card:hover { transform: translateY(-8px); }
        .cover-wrapper { padding-top: 140%; position: relative; background: #eee; }
        .cover-wrapper img { position: absolute; top: 0; width: 100%; height: 100%; object-fit: cover; }
        .manga-title { padding: 12px; font-weight: 700; text-align: center; }

        /* 詳情頁 */
        .detail-view { max-width: 900px; margin: 30px auto; background: var(--card-bg); border-radius: var(--radius-lg); overflow: hidden; width: 92%; box-shadow: var(--shadow); }
        .detail-header { display: flex; padding: 40px; background: #2c3e50; color: #fff; gap: 35px; align-items: flex-start; }
        .detail-cover { width: 200px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); flex-shrink: 0; }
        .detail-info { flex-grow: 1; }
        .detail-info h1 { margin: 0 0 15px 0; font-size: 28px; color: #fff; }
        .manga-meta { margin-bottom: 20px; font-size: 14px; display: flex; flex-wrap: wrap; gap: 15px; opacity: 0.9; }
        .manga-meta span i { margin-right: 5px; color: var(--primary-color); }
        #detail-desc { line-height: 1.6; font-size: 15px; color: #ecf0f1; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }

        .chapter-container { padding: 30px; }
        .chapter-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .chapter-item { padding: 12px; background: #f8f9fa; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #eee; transition: 0.2s; font-weight: 500; }
        .chapter-item:hover { background: var(--primary-color); color: #fff; border-color: var(--primary-color); transform: scale(1.05); }

        /* ===================== 閱讀器 ===================== */
        #reader-page {
            background: #111;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* 頂部工具列 */
        #reader-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            position: absolute;
            top: 0;
            left: 0; right: 0;
            z-index: 200;
        }
        #reader-chapter-title { font-size: 15px; font-weight: 700; color: #f0e6c8; letter-spacing: 1px; font-family: 'Noto Sans TC', sans-serif; }
        #reader-page-info { font-size: 13px; color: #888; font-family: 'Noto Sans TC', sans-serif; }

        /* 閱讀器主區域 */
        #reader-viewer {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            height: 100vh;
        }

        /* 點擊區域 */
        .reader-click-zone {
            position: absolute;
            top: 0; bottom: 0;
            width: 35%;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        #reader-zone-left  { left: 0; }
        #reader-zone-right { right: 0; }
        .reader-click-hint {
            opacity: 0;
            transition: opacity 0.15s;
            font-size: 12px;
            color: rgba(240,230,200,0.5);
            letter-spacing: 1px;
            pointer-events: none;
            font-family: 'Noto Sans TC', sans-serif;
        }
        .reader-click-zone:hover .reader-click-hint { opacity: 1; }
        .reader-click-zone:active { background: rgba(255,255,255,0.04); }

        /* 頁面容器（單頁 & 雙頁） */
        #reader-page-container {
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            max-width: 100%;
            max-height: 100%;
        }

        /* 條漫捲動容器 */
        #reader-scroll-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            scrollbar-width: none;
            pointer-events: auto;
        }
        #reader-scroll-container::-webkit-scrollbar { display: none; }

        .reader-page-wrap {
            position: relative;
            overflow: hidden;
            border-radius: 2px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }

        /* 圖片自適應視窗 */
        .reader-manga-img {
            display: block;
            max-height: calc(100vh - 0px);
            max-width: calc(50vw - 4px);
            width: auto;
            height: auto;
            object-fit: contain;
            user-select: none;
        }
        .reader-manga-img.single {
            max-width: 100vw;
            max-height: 100vh;
        }
        .reader-manga-img.scroll-mode {
            max-width: 600px;
            width: 90vw;
            height: auto;
            max-height: none;
        }

        .reader-page-flip-enter { animation: readerFlipIn 0.3s ease; }
        @keyframes readerFlipIn {
            from { opacity: 0; transform: perspective(800px) rotateY(20deg) scale(0.97); }
            to   { opacity: 1; transform: perspective(800px) rotateY(0deg) scale(1); }
        }

        .reader-page-num {
            position: absolute; bottom: 6px; right: 8px;
            font-size: 10px; color: rgba(255,255,255,0.35);
            font-family: monospace; pointer-events: none;
        }

        /* 底部工具列 */
        #reader-bottombar {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(25,25,25,0.95);
            backdrop-filter: blur(15px);
            color: #fff;
            padding: 10px;
            border-radius: 50px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 200;
            width: 560px;
            max-width: 94vw;
            font-family: 'Noto Sans TC', sans-serif;
        }

        .reader-toolbar-btn {
            cursor: pointer;
            font-size: 13px;
            padding: 8px 10px;
            border-radius: 30px;
            transition: all 0.2s;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            border: none;
            background: none;
            color: #fff;
        }
        .reader-toolbar-btn i { font-size: 16px; }
        .reader-toolbar-btn span { font-size: 10px; opacity: 0.75; }
        .reader-toolbar-btn:hover:not(.disabled) { color: var(--primary-color); }
        .reader-toolbar-btn.disabled { opacity: 0.25; cursor: not-allowed; }

        /* 模式切換按鈕 */
        .mode-btn {
            cursor: pointer;
            font-size: 10px;
            padding: 4px 9px;
            border-radius: 12px;
            border: 1px solid #555;
            background: #2a2a2a;
            color: #888;
            transition: all 0.2s;
            font-family: 'Noto Sans TC', sans-serif;
        }
        .mode-btn.active { border-color: #f0e6c8; color: #f0e6c8; background: #2a2010; }

        #reader-mode-group {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 2;
            justify-content: center;
        }

        /* 分隔線 */
        .toolbar-divider {
            width: 1px;
            height: 30px;
            background: rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        /* ===================== 結尾彈窗 ===================== */
        #end-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #end-modal-overlay.show { display: flex; }
        #end-modal {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 36px 32px;
            text-align: center;
            width: 320px;
            max-width: 88vw;
            font-family: 'Noto Sans TC', sans-serif;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to   { opacity: 1; transform: scale(1); }
        }
        #end-modal h2 { color: #f0e6c8; font-size: 18px; margin: 0 0 8px 0; }
        #end-modal p  { color: #888; font-size: 13px; margin: 0 0 28px 0; line-height: 1.6; }
        .end-modal-btns { display: flex; flex-direction: column; gap: 10px; }
        .end-btn {
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Noto Sans TC', sans-serif;
            transition: filter 0.2s;
        }
        .end-btn:hover { filter: brightness(1.1); }
        .end-btn.green  { background: #2ecc71; color: #fff; }
        .end-btn.orange { background: var(--primary-color); color: #fff; }
        .end-btn.gray   { background: #2a2a2a; color: #aaa; border: 1px solid #444; }

        @media (max-width: 768px) {
            .detail-header { flex-direction: column; text-align: center; align-items: center; padding: 30px 20px; }
            .detail-cover { width: 160px; }
            .manga-meta { justify-content: center; }
            .header-left .btn-home { display: none; }
            #reader-bottombar { width: 96vw; }
            .reader-toolbar-btn span { display: none; }
        }
    </style>
</head>
<body>

<header id="main-header">
    <div class="header-left">
        <div class="logo" onclick="showPage('home-page')">方方Ray漫畫館</div>
        <div class="btn-home" onclick="showPage('home-page')">返回首頁</div>
    </div>
    <div class="social-links">
        <a href="https://www.instagram.com/rf2_cg" target="_blank"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.threads.com/@rf2_cg" target="_blank"><i class="fa-brands fa-threads"></i></a>
        <a href="https://x.com/rf2_cg" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="#" target="_blank"><i class="fa-brands fa-discord"></i></a>
    </div>
</header>

<!-- 首頁 -->
<div id="home-page" class="page active">
    <div class="manga-grid" id="home-grid">
        <div style="grid-column: 1 / -1; text-align: center; padding: 50px;">載入中...</div>
    </div>
</div>

<!-- 詳情頁 -->
<div id="detail-page" class="page">
    <div class="detail-view">
        <div class="detail-header">
            <img id="detail-img" class="detail-cover" src="" alt="封面">
            <div class="detail-info">
                <h1 id="detail-title">標題</h1>
                <div class="manga-meta">
                    <span id="meta-author"><i class="fa-solid fa-user"></i> 載入中...</span>
                    <span id="meta-type"><i class="fa-solid fa-tag"></i> 載入中...</span>
                    <span id="meta-chapters"><i class="fa-solid fa-book-open"></i> 共 0 話</span>
                    <span id="meta-update"><i class="fa-solid fa-clock"></i> 更新於...</span>
                </div>
                <p id="detail-desc">簡介內容...</p>
            </div>
        </div>
        <div class="chapter-container">
            <h3>選擇章節</h3>
            <div class="chapter-list" id="detail-chapters"></div>
        </div>
    </div>
</div>

<!-- 結尾彈窗 -->
<div id="end-modal-overlay">
    <div id="end-modal">
        <h2 id="end-modal-title">本話結束</h2>
        <p id="end-modal-desc"></p>
        <div class="end-modal-btns" id="end-modal-btns"></div>
    </div>
</div>

<!-- 閱讀器頁面 -->
<div id="reader-page" class="page">
    <!-- 頂部資訊列（點擊顯示） -->
    <div id="reader-topbar">
        <div id="reader-chapter-title">章節名稱</div>
        <div id="reader-page-info">第 <span id="reader-cur-page">1</span> 頁 / 共 <span id="reader-total-pages">1</span> 頁</div>
    </div>

    <!-- 主閱讀區 -->
    <div id="reader-viewer">
        <!-- 點擊區域 -->
        <div id="reader-zone-left" class="reader-click-zone">
            <span class="reader-click-hint" id="reader-hint-left"></span>
        </div>
        <div id="reader-zone-right" class="reader-click-zone">
            <span class="reader-click-hint" id="reader-hint-right"></span>
        </div>

        <!-- 單頁/雙頁容器 -->
        <div id="reader-page-container"></div>

        <!-- 條漫捲動容器 -->
        <div id="reader-scroll-container"></div>
    </div>

    <!-- 底部工具列（點擊顯示） -->
    <div id="reader-bottombar">
        <button class="reader-toolbar-btn disabled" id="btn-prev-ch" onclick="prevChapter()">
            <i class="fa-solid fa-backward-step"></i><span>上一章</span>
        </button>
        <button class="reader-toolbar-btn" onclick="showPage('detail-page')">
            <i class="fa-solid fa-list-ul"></i><span>目錄</span>
        </button>
        <div class="toolbar-divider"></div>
        <div id="reader-mode-group">
            <button class="mode-btn active" id="rbtn-single" onclick="setReaderMode('single')">單頁</button>
            <button class="mode-btn" id="rbtn-double" onclick="setReaderMode('double')">雙頁</button>
            <button class="mode-btn" id="rbtn-scroll" onclick="setReaderMode('scroll')">條漫</button>
        </div>
        <div class="toolbar-divider"></div>
        <button class="reader-toolbar-btn" id="btn-fullscreen" onclick="toggleFullScreen()">
            <i class="fa-solid fa-expand"></i><span>全螢幕</span>
        </button>
        <button class="reader-toolbar-btn" onclick="showPage('home-page')">
            <i class="fa-solid fa-house"></i><span>首頁</span>
        </button>
        <button class="reader-toolbar-btn disabled" id="btn-next-ch" onclick="nextChapter()">
            <i class="fa-solid fa-forward-step"></i><span>下一章</span>
        </button>
    </div>
</div>

<script>
    /* ===================== 資料 & 首頁 ===================== */
    let mangaData = [];
    let currentMangaIdx = 0;
    let currentChapterIdx = 0;
    let currentPageIdx = 0;
    let currentImages = [];

    async function loadData() {
        try {
            const response = await fetch('data/data.json');
            mangaData = await response.json();
            renderHome();
        } catch (error) {
            console.error('Data Load Error:', error);
            document.getElementById('home-grid').innerHTML = '資料讀取失敗，請檢查 data/data.json 路徑';
        }
    }

    function renderHome() {
        const grid = document.getElementById('home-grid');
        grid.innerHTML = mangaData.map((m, i) => `
            <div class="manga-card" onclick="openManga(${i})">
                <div class="cover-wrapper"><img src="${m.cover}" loading="lazy"></div>
                <div class="manga-title">${m.title}</div>
            </div>
        `).join('');
    }

    function openManga(index) {
        currentMangaIdx = index;
        const m = mangaData[index];
        document.getElementById('detail-title').innerText = m.title;
        document.getElementById('detail-img').src = m.cover;
        document.getElementById('detail-desc').innerText = m.desc;
        document.getElementById('meta-author').innerHTML = `<i class="fa-solid fa-user"></i> ${m.author}`;
        document.getElementById('meta-type').innerHTML = `<i class="fa-solid fa-tag"></i> ${m.type || '未分類'}`;
        document.getElementById('meta-chapters').innerHTML = `<i class="fa-solid fa-book-open"></i> 共 ${m.chapters.length} 話`;
        document.getElementById('meta-update').innerHTML = `<i class="fa-solid fa-clock"></i> ${m.updateTime || '未知'}`;
        const list = document.getElementById('detail-chapters');
        list.innerHTML = m.chapters.map((ch, ci) => `<div class="chapter-item" onclick="startReading(${ci})">${ch.name}</div>`).join('');
        showPage('detail-page');
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const isReader = id === 'reader-page';
        document.getElementById('main-header').style.display = isReader ? 'none' : 'flex';
        if (!isReader) {
            readerUIShown = false;
        }
        window.scrollTo({ top: 0 });
    }

    /* ===================== 閱讀器狀態 ===================== */
    let readerMode = 'single'; // 'single' | 'double' | 'scroll'
    let readerUIShown = false;

    function startReading(chIndex) {
        currentChapterIdx = chIndex;
        currentImages = mangaData[currentMangaIdx].chapters[chIndex].images;
        currentPageIdx = 0;
        readerUIShown = false;
        updateChapterBtns();
        renderReaderPage();
        showPage('reader-page');
    }

    function updateChapterBtns() {
        const manga = mangaData[currentMangaIdx];
        document.getElementById('btn-prev-ch').classList.toggle('disabled', currentChapterIdx === 0);
        document.getElementById('btn-next-ch').classList.toggle('disabled', currentChapterIdx === manga.chapters.length - 1);
        const ch = manga.chapters[currentChapterIdx];
        document.getElementById('reader-chapter-title').innerText = manga.title + '・' + ch.name;
    }

    function updatePageInfo() {
        document.getElementById('reader-cur-page').textContent = currentPageIdx + 1;
        document.getElementById('reader-total-pages').textContent = currentImages.length;
    }

    function updateHints() {
        const hL = document.getElementById('reader-hint-left');
        const hR = document.getElementById('reader-hint-right');
        if (readerMode === 'single') {
            hL.textContent = '← 上一頁';
            hR.textContent = '下一頁 →';
        } else if (readerMode === 'double') {
            hL.textContent = '← 下一頁';
            hR.textContent = '上一頁 →';
        } else {
            hL.textContent = '';
            hR.textContent = '';
        }
    }

    /* ===================== 渲染頁面 ===================== */
    function snapDouble(idx) {
        return idx % 2 === 0 ? idx : idx - 1;
    }

    function renderReaderPage() {
        const container  = document.getElementById('reader-page-container');
        const scrollEl   = document.getElementById('reader-scroll-container');
        const zoneL      = document.getElementById('reader-zone-left');
        const zoneR      = document.getElementById('reader-zone-right');

        container.innerHTML = '';
        scrollEl.innerHTML  = '';

        if (readerMode === 'scroll') {
            container.style.display = 'none';
            scrollEl.style.display  = 'flex';
            zoneL.style.display = 'none';
            zoneR.style.display = 'none';

            currentImages.forEach((src, p) => {
                const wrap = document.createElement('div');
                wrap.className = 'reader-page-wrap';
                wrap.style.cssText = 'margin:6px 0;';
                const img = document.createElement('img');
                img.className = 'reader-manga-img scroll-mode';
                img.src = src;
                img.loading = 'lazy';
                const badge = document.createElement('div');
                badge.className = 'reader-page-num';
                badge.textContent = p + 1;
                wrap.appendChild(img);
                wrap.appendChild(badge);
                scrollEl.appendChild(wrap);
            });

            // 捲動到目前頁
            const itemH = scrollEl.scrollHeight / currentImages.length;
            scrollEl.scrollTop = currentPageIdx * itemH;

            scrollEl.onscroll = () => {
                const itemH2 = scrollEl.scrollHeight / currentImages.length;
                const newPage = Math.min(currentImages.length - 1, Math.round(scrollEl.scrollTop / itemH2));
                if (newPage !== currentPageIdx) {
                    currentPageIdx = newPage;
                    updatePageInfo();
                    preloadNext();
                }
            };

        } else {
            container.style.display = 'flex';
            scrollEl.style.display  = 'none';
            zoneL.style.display = 'flex';
            zoneR.style.display = 'flex';

            let pagesToShow;
            if (readerMode === 'double') {
                const base = snapDouble(currentPageIdx);
                currentPageIdx = base;
                // 右至左：右邊=base（頁碼小），左邊=base+1（頁碼大）
                const right = base;
                const left  = base + 1 < currentImages.length ? base + 1 : null;
                pagesToShow = left !== null ? [left, right] : [right];
            } else {
                pagesToShow = [currentPageIdx];
            }

            container.style.cssText = 'display:flex;flex-direction:row;gap:' + (readerMode === 'double' ? '2px' : '0') + ';align-items:center;justify-content:center;pointer-events:none;max-width:100%;max-height:100%;';

            pagesToShow.forEach(p => {
                const wrap = document.createElement('div');
                wrap.className = 'reader-page-wrap reader-page-flip-enter';
                const img = document.createElement('img');
                img.className = 'reader-manga-img' + (readerMode === 'single' ? ' single' : '');
                img.src = currentImages[p];
                img.draggable = false;
                const badge = document.createElement('div');
                badge.className = 'reader-page-num';
                badge.textContent = p + 1;
                wrap.appendChild(img);
                wrap.appendChild(badge);
                container.appendChild(wrap);
            });
        }

        updatePageInfo();
        updateHints();
        preloadNext();
    }

    function preloadNext() {
        if (currentPageIdx + 1 < currentImages.length) {
            new Image().src = currentImages[currentPageIdx + 1];
        }
        if (readerMode === 'double' && currentPageIdx + 2 < currentImages.length) {
            new Image().src = currentImages[currentPageIdx + 2];
        }
    }

    /* ===================== 翻頁邏輯 ===================== */
    function readerPrev() {
        if (readerMode === 'double') {
            if (currentPageIdx >= 2) { currentPageIdx -= 2; renderReaderPage(); }
            else if (currentPageIdx > 0) { currentPageIdx = 0; renderReaderPage(); }
            else prevChapter();
        } else {
            if (currentPageIdx > 0) { currentPageIdx--; renderReaderPage(); }
            else prevChapter();
        }
    }

    function readerNext() {
        if (readerMode === 'double') {
            const step = currentPageIdx + 1 < currentImages.length ? 2 : 1;
            if (currentPageIdx + step < currentImages.length) { currentPageIdx += step; renderReaderPage(); }
            else nextChapterOrEnd();
        } else {
            if (currentPageIdx < currentImages.length - 1) { currentPageIdx++; renderReaderPage(); }
            else nextChapterOrEnd();
        }
    }

    function nextChapterOrEnd() {
        const manga = mangaData[currentMangaIdx];
        const hasNext = currentChapterIdx < manga.chapters.length - 1;
        const title   = document.getElementById('end-modal-title');
        const desc    = document.getElementById('end-modal-desc');
        const btns    = document.getElementById('end-modal-btns');

        title.textContent = '本話結束';
        btns.innerHTML = '';

        if (hasNext) {
            desc.textContent = '';
            // 下一話（綠色）
            const btnNext = document.createElement('button');
            btnNext.className = 'end-btn green';
            btnNext.textContent = '▶ 下一話';
            btnNext.onclick = () => { closeEndModal(); startReading(currentChapterIdx + 1); };
            // 停留本話（灰色）
            const btnStay = document.createElement('button');
            btnStay.className = 'end-btn gray';
            btnStay.textContent = '停留本話';
            btnStay.onclick = () => closeEndModal();
            // 回首頁（橘色）
            const btnHome = document.createElement('button');
            btnHome.className = 'end-btn orange';
            btnHome.textContent = '回首頁';
            btnHome.onclick = () => { closeEndModal(); showPage('home-page'); };
            btns.appendChild(btnNext);
            btns.appendChild(btnStay);
            btns.appendChild(btnHome);
        } else {
            title.textContent = '本話為最後一話';
            desc.textContent = '感謝收看！';
            // 停留本話（灰色）
            const btnStay = document.createElement('button');
            btnStay.className = 'end-btn gray';
            btnStay.textContent = '停留本話';
            btnStay.onclick = () => closeEndModal();
            // 回首頁（橘色）
            const btnHome = document.createElement('button');
            btnHome.className = 'end-btn orange';
            btnHome.textContent = '回首頁';
            btnHome.onclick = () => { closeEndModal(); showPage('home-page'); };
            btns.appendChild(btnStay);
            btns.appendChild(btnHome);
        }

        document.getElementById('end-modal-overlay').classList.add('show');
    }

    function closeEndModal() {
        document.getElementById('end-modal-overlay').classList.remove('show');
    }

    function prevChapter() {
        if (currentChapterIdx > 0) startReading(currentChapterIdx - 1);
    }
    function nextChapter() {
        const manga = mangaData[currentMangaIdx];
        if (currentChapterIdx < manga.chapters.length - 1) startReading(currentChapterIdx + 1);
    }

    /* ===================== 模式切換 ===================== */
    function setReaderMode(m) {
        readerMode = m;
        ['single', 'double', 'scroll'].forEach(id => {
            document.getElementById('rbtn-' + id).classList.toggle('active', id === m);
        });
        if (m === 'double') currentPageIdx = snapDouble(currentPageIdx);
        renderReaderPage();
    }

    /* ===================== UI 顯示/隱藏 ===================== */
    function toggleUI() { /* 固定顯示，不做任何事 */ }

    /* ===================== 點擊區域事件 ===================== */
    document.getElementById('reader-zone-left').onclick = () => {
        if (readerMode === 'double') readerNext();
        else readerPrev();
    };
    document.getElementById('reader-zone-right').onclick = () => {
        if (readerMode === 'double') readerPrev();
        else readerNext();
    };

    // 中間區域點擊不做任何事

    /* ===================== 鍵盤控制 ===================== */
    document.addEventListener('keydown', e => {
        if (!document.getElementById('reader-page').classList.contains('active')) return;
        if (readerMode === 'scroll') {
            if (e.key === 'ArrowDown') readerNext();
            if (e.key === 'ArrowUp')   readerPrev();
        } else if (readerMode === 'double') {
            if (e.key === 'ArrowLeft')  readerNext();
            if (e.key === 'ArrowRight') readerPrev();
        } else {
            if (e.key === 'ArrowLeft')  readerPrev();
            if (e.key === 'ArrowRight') readerNext();
        }
    });

    /* ===================== 觸控滑動 ===================== */
    let touchStartX = 0, touchStartY = 0;
    document.getElementById('reader-viewer').addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.getElementById('reader-viewer').addEventListener('touchend', e => {
        if (readerMode === 'scroll') return;
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
            if (readerMode === 'double') { dx > 0 ? readerPrev() : readerNext(); }
            else                         { dx > 0 ? readerPrev() : readerNext(); }
        }
    }, { passive: true });

    /* ===================== 全螢幕 ===================== */
    function toggleFullScreen() {
        const doc   = window.document;
        const docEl = document.getElementById('reader-page');
        const requestFS = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
        const exitFS    = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
        const isFS = doc.fullscreenElement || doc.mozFullScreenElement || doc.webkitFullscreenElement || doc.msFullscreenElement;
        if (!isFS) {
            requestFS.call(docEl);
            document.getElementById('btn-fullscreen').innerHTML = '<i class="fa-solid fa-compress"></i><span>縮小</span>';
        } else {
            exitFS.call(doc);
            document.getElementById('btn-fullscreen').innerHTML = '<i class="fa-solid fa-expand"></i><span>全螢幕</span>';
        }
    }

    loadData();
</script>
